<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptador de CV Profesional y PEAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --sage: #9caf88; --euro-blue: #004494; --linen: #f5f3ef; }
        body { background-color: var(--linen); font-family: 'Libre Franklin', sans-serif; padding-top: 40px; }
        .tool-card { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        textarea { width: 100%; height: 120px; margin: 10px 0; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-tool { background: var(--sage); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .error-msg { color: red; font-size: 0.8rem; display: none; margin-bottom: 10px; }
        
        /* Estilo del folio que verá el usuario antes de descargar */
        #preview-cv { background: white; border: 1px solid #ddd; padding: 20px; margin-top: 20px; font-family: Arial, sans-serif; font-size: 14px; }
        .cv-title { color: var(--euro-blue); font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #eee; margin-top: 15px; }
    </style>
</head>

<body>
    <div class="tool-card">
        <div id="step1">
            <h2>¿Qué CV necesitas?</h2>
            <button class="btn-tool" onclick="selectLevel('profesional')">Profesional / PEAC</button>
            <button class="btn-tool" style="background:#666" onclick="selectLevel('operativo')">Sector Operativo</button>
        </div>

        <div id="step2" class="hidden">
            <h2>Tu experiencia</h2>
            <p style="font-size:0.8rem; color:#666;">Describe tus tareas principales (mínimo 2 frases):</p>
            <textarea id="cv-input" placeholder="Ej: He trabajado en limpieza de oficinas y cristales durante 2 años..."></textarea>
            <div id="err2" class="error-msg">⚠️ Por favor, escribe un poco más para que el sistema pueda trabajar.</div>
            <button class="btn-tool" onclick="validateStep2()">Continuar</button>
        </div>

        <div id="step3" class="hidden">
            <h2>Puesto deseado</h2>
            <textarea id="job-input" placeholder="Ej: Limpiador industrial / Administrativo"></textarea>
            <button class="btn-tool" onclick="generateCV()">Generar CV Final ✨</button>
        </div>

        <div id="result-step" class="hidden">
            <h2 style="text-align:center;">¡CV Generado!</h2>
            <div id="preview-cv">
                <div style="border-bottom: 2px solid #004494; padding-bottom:10px;">
                    <h1 style="margin:0; font-size:20px;">[TU NOMBRE Y APELLIDOS]</h1>
                    <p style="margin:0; font-size:12px; color:#666;">📍 Residencia en España</p>
                </div>
                <div class="cv-title">Perfil</div>
                <div id="res-profile"></div>
                <div class="cv-title">Experiencia</div>
                <div id="res-experience" style="white-space:pre-wrap;"></div>
            </div>
            <button class="btn-tool" style="background:#004494;" onclick="downloadPDF()">📥 DESCARGAR PDF AHORA</button>
            <button class="btn-tool" style="background:#333;" onclick="location.reload()">Empezar de nuevo</button>
        </div>
    </div>

    <script>
        let mode = '';

        function selectLevel(l) { 
            mode = l; 
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        function validateStep2() {
            const txt = document.getElementById('cv-input').value.trim();
            if(txt.length < 40) { document.getElementById('err2').style.display='block'; return; }
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
        }

        function generateCV() {
            const expInput = document.getElementById('cv-input').value;
            const jobInput = document.getElementById('job-input').value;

            const profileText = mode === 'profesional' 
                ? "Profesional enfocado a la acreditación de competencias técnicas y cumplimiento de normativas." 
                : "Persona proactiva con experiencia en tareas operativas y trabajo en equipo.";

            // Inyectamos el texto en el HTML
            document.getElementById('res-profile').innerText = profileText;
            document.getElementById('res-experience').innerText = expInput;
            
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('result-step').classList.remove('hidden');
        }

        function downloadPDF() {
            // Obtenemos el contenido del CV
            const content = document.getElementById('preview-cv').innerHTML;
            
            // Creamos un elemento temporal "invisible" para el PDF que sea blanco puro
            const worker = document.createElement('div');
            worker.innerHTML = content;
            worker.style.padding = "40px";
            worker.style.width = "700px";
            worker.style.background = "white";

            const opt = {
                margin: 10,
                filename: 'Mi_CV_Profesional.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Ejecutamos la descarga sobre el elemento temporal
            html2pdf().set(opt).from(worker).save();
        }
    </script>
</body>
</html>
